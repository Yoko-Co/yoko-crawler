# Rate limiting zones (place in http context).
limit_req_zone $binary_remote_addr zone=crawl_post:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=crawl_api:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name crawl.example.com;

    ssl_certificate     /etc/letsencrypt/live/crawl.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crawl.example.com/privkey.pem;

    # TLS hardening.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # Security headers.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        client_max_body_size 1k;
        limit_req zone=crawl_api burst=20 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Stricter rate limit on POST /crawl (spawns subprocesses).
    location = /crawl {
        proxy_pass http://127.0.0.1:8100;
        limit_req zone=crawl_post burst=3 nodelay;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        client_max_body_size 1k;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name crawl.example.com;
    return 301 https://$host$request_uri;
}
